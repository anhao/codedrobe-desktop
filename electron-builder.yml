appId: app.codedrobe.desktop
productName: CodeDrobe

directories:
  output: out/make/electron-builder

win:
  executableName: CodeDrobe
  icon: assets/icon.ico
  target:
    - nsis
    - portable

# Registered by the NSIS installer (HKCU); the portable build has no installer,
# so "Open with -> CodeDrobe" plus argv handling covers it there.
fileAssociations:
  - ext: codedrobe-theme
    name: CodeDrobe Theme
    description: CodeDrobe theme package
    role: Viewer
    icon: assets/theme-file.ico
  - ext: codex-theme
    name: Legacy Codex Theme
    description: Legacy Codex theme package
    role: Viewer
    icon: assets/theme-file.ico

nsis:
  artifactName: CodeDrobe-${version}-${arch}-Setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true

portable:
  artifactName: CodeDrobe-${version}-${arch}-Portable.${ext}
  requestExecutionLevel: user

publish: null
